<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tech Community | Multimedia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="./index.html">TECH COMMUNITY</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="./index.html">Beranda</a>
                <a class="nav-link" href="./form.html">Pendaftaran</a>
                <a class="nav-link active" href="./gallery.html">Multimedia</a>
            </div>
        </div>
    </nav>

    <main class="container my-5 text-center">
        <h2 class="mb-5 fw-bold">Multimedia Hub</h2>
        <div class="row g-4 text-center">
            <div class="col-md-4">
                <div class="card media-card p-3 h-100">
                    <h5>Visual Branding</h5>
                    <img id="techImg" src="Photo.JPG" class="img-fluid rounded mb-3" style="height: 250px; object-fit: cover;">
                    <button class="btn btn-sm btn-outline-primary" onclick="changeImage()">Ganti Foto</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card media-card p-3 h-100">
                    <h5>Latest Workshop</h5>
                    <div class="ratio ratio-16x9">
                        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card media-card p-3 h-100">
                    <h5>Community Podcast</h5>
                    <audio id="techAudio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
                    <div class="mt-4">
                        <button class="btn btn-success w-100 mb-2" onclick="playAudio()">Play</button>
                        <button class="btn btn-danger w-100" onclick="stopAudio()">Stop</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
