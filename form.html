<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tech Community | Join</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="./index.html">TECH COMMUNITY</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="./index.html">Beranda</a>
                <a class="nav-link active" href="./form.html">Pendaftaran</a>
                <a class="nav-link" href="./gallery.html">Multimedia</a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Form Anggota Baru</h4>
            </div>
            <div class="card-body">
                <form id="techForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nama Lengkap</label>
                        <input type="text" id="name" class="form-control" placeholder="Masukkan Nama" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="email@tech.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Bidang Minat</label>
                        <select id="interest" class="form-select">
                            <option value="Web Development">Web Development</option>
                            <option value="Cyber Security">Cyber Security</option>
                            <option value="Data Science">Data Science</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Daftar Sekarang</button>
                </form>
            </div>
        </div>

        <div id="displayArea" class="mt-4 p-4 bg-white border rounded shadow-sm d-none mx-auto" style="max-width: 600px;">
            <h5 class="text-success border-bottom pb-2">Konfirmasi Pendaftaran (Array):</h5>
            <div id="submittedData"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
